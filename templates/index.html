<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>装箱单英文转换</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="brand">
          <div class="mark">PKL</div>
          <div>
            <h1>装箱单英文转换</h1>
            <p>上传电梯装箱单 Excel，生成英文 Excel 和可打印 PDF。</p>
          </div>
        </div>

        <div id="alert" class="alert" hidden></div>

        <form id="upload-form" class="upload" action="{{ url_for('convert') }}" method="post" enctype="multipart/form-data">
          <label class="drop">
            <input id="packing_list" type="file" name="packing_list" accept=".xlsx" required>
            <span class="icon">↑</span>
            <span class="title">选择 .xlsx 装箱单</span>
            <span id="file-name" class="hint">支持类似 XFJ2026-1013 的装箱单格式</span>
          </label>
          <button id="submit-button" type="submit">生成 Excel + PDF</button>
        </form>

        <div id="result" class="result" hidden>
          <strong>转换完成</strong>
          <span id="result-meta"></span>
          <a id="download-link" class="download primary" href="#">重新下载生成包</a>
        </div>

        <div class="notes">
          <span>保留 Excel 内嵌 Logo</span>
          <span>按箱号分页</span>
          <span>电梯行业术语翻译</span>
          <span>自动检查中文残留</span>
          <span>生成 zip 下载包</span>
        </div>
      </section>
    </main>
    <script>
      const form = document.querySelector("#upload-form");
      const input = document.querySelector("#packing_list");
      const nameLabel = document.querySelector("#file-name");
      const button = document.querySelector("#submit-button");
      const alertBox = document.querySelector("#alert");
      const resultBox = document.querySelector("#result");
      const resultMeta = document.querySelector("#result-meta");
      const downloadLink = document.querySelector("#download-link");

      input.addEventListener("change", () => {
        nameLabel.textContent = input.files[0]?.name || "支持类似 XFJ2026-1013 的装箱单格式";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        alertBox.hidden = true;
        resultBox.hidden = true;

        if (!input.files.length) {
          alertBox.textContent = "请选择一个 Excel 装箱单文件。";
          alertBox.hidden = false;
          return;
        }

        button.disabled = true;
        button.textContent = "正在转换...";

        try {
          const body = new FormData(form);
          const response = await fetch(form.action, { method: "POST", body });
          if (!response.ok) {
            const data = await response.json().catch(() => ({ error: "转换失败，请检查文件格式。" }));
            throw new Error(data.error || "转换失败，请检查文件格式。");
          }

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const disposition = response.headers.get("Content-Disposition") || "";
          const match = disposition.match(/filename="?([^"]+)"?/);
          const filename = match?.[1] || "packing-list-English.zip";

          downloadLink.href = url;
          downloadLink.download = filename;

          const packageCount = response.headers.get("X-Package-Count");
          const pageCount = response.headers.get("X-Page-Count");
          const residualCount = Number(response.headers.get("X-Residual-Chinese-Count") || "0");
          const checkText = residualCount > 0
            ? `发现 ${residualCount} 处中文残留，请查看下载包内的检查报告。`
            : "中文残留检查通过。";
          resultMeta.textContent = `已生成 ${packageCount || "-"} 个箱号明细，PDF 共 ${pageCount || "-"} 页。${checkText}`;
          resultBox.hidden = false;

          const clicker = document.createElement("a");
          clicker.href = url;
          clicker.download = filename;
          document.body.appendChild(clicker);
          clicker.click();
          clicker.remove();
        } catch (error) {
          alertBox.textContent = error.message;
          alertBox.hidden = false;
        } finally {
          button.disabled = false;
          button.textContent = "生成 Excel + PDF";
        }
      });
    </script>
  </body>
</html>
